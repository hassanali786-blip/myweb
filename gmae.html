 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Battle Royale (PUBG Style)</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #1e5e2f; /* Green Battleground */
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            cursor: crosshair;
        }
        .controls {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #bbb;
        }
    </style>
</head>
<body>

    <h2 style="margin: 5px; color: #ffcc00;">⚔️ MINI BATTLE ROYALE ⚔️</h2>
    <div style="font-size: 18px; margin-bottom: 10px;">Kills: <span id="score">0</span> | Health: <span id="health">100</span>%</div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="controls">
        <strong>🎮 CONTROLS:</strong> Move: <b>W, A, S, D</b> | Aim & Shoot: <b>Mouse Click</b>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Player Details
    let player = { x: 400, y: 250, size: 15, speed: 4, health: 100, kills: 0 };
    
    // Arrays for Game Objects
    let bullets = [];
    let enemies = [];
    let keys = {};

    // Keyboard Input Listeners
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    // Mouse Click to Shoot
    window.addEventListener("click", e => {
        let rect = canvas.getBoundingClientRect();
        let mouseX = e.clientX - rect.left;
        let mouseY = e.clientY - rect.top;

        // Angle calculation between player and mouse
        let angle = Math.atan2(mouseY - player.y, mouseX - player.x);
        
        bullets.push({
            x: player.x,
            y: player.y,
            vX: Math.cos(angle) * 7,
            vY: Math.sin(angle) * 7
        });
    });

    // Spawn Enemy Function
    function spawnEnemy() {
        if (enemies.length < 5) {
            let side = Math.floor(Math.random() * 4);
            let x, y;
            if (side === 0) { x = 0; y = Math.random() * canvas.height; }
            else if (side === 1) { x = canvas.width; y = Math.random() * canvas.height; }
            else if (side === 2) { x = Math.random() * canvas.width; y = 0; }
            else { x = Math.random() * canvas.width; y = canvas.height; }

            enemies.push({ x: x, y: y, size: 12, speed: 1.5 + Math.random() * 1.5 });
        }
    }
    setInterval(spawnEnemy, 1500);

    // Game Loop
    function update() {
        if (player.health <= 0) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "red";
            ctx.font = "40px Arial";
            ctx.fillText("💀 GAME OVER 💀", canvas.width/2 - 150, canvas.height/2);
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText(`Total Kills: ${player.kills} - Refresh to Restart`, canvas.width/2 - 130, canvas.height/2 + 40);
            return;
        }

        // 1. Move Player
        if (keys['w'] && player.y > player.size) player.y -= player.speed;
        if (keys['s'] && player.y < canvas.height - player.size) player.y += player.speed;
        if (keys['a'] && player.x > player.size) player.x -= player.speed;
        if (keys['d'] && player.x < canvas.width - player.size) player.x += player.speed;

        // Clear Canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 2. Draw Player (Blue Circle)
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
        ctx.fillStyle = "#00a8ff";
        ctx.fill();
        ctx.closePath();

        // 3. Update & Draw Bullets
        bullets.forEach((bullet, bIndex) => {
            bullet.x += bullet.vX;
            bullet.y += bullet.vY;

            // Draw Bullet
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = "#ffcc00";
            ctx.fill();
            ctx.closePath();

            // Remove out of bounds bullets
            if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                bullets.splice(bIndex, 1);
            }
        });

        // 4. Update & Draw Enemies (Red Circles)
        enemies.forEach((enemy, eIndex) => {
            // Move enemy towards player
            let angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            enemy.x += Math.cos(angle) * enemy.speed;
            enemy.y += Math.sin(angle) * enemy.speed;

            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
            ctx.fillStyle = "#ff4d4d";
            ctx.fill();
            ctx.closePath();

            // Check if enemy touches player
            let distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
            if (distToPlayer < player.size + enemy.size) {
                player.health -= 0.5; // Damage player
                document.getElementById("health").innerText = Math.max(0, Math.floor(player.health));
            }

            // Check bullet collision with enemy
            bullets.forEach((bullet, bIndex) => {
                let distToBullet = Math.hypot(enemy.x - bullet.x, enemy.y - bullet.y);
                if (distToBullet < enemy.size + 4) {
                    enemies.splice(eIndex, 1);
                    bullets.splice(bIndex, 1);
                    player.kills++;
                    document.getElementById("score").innerText = player.kills;
                }
            });
        });

        requestAnimationFrame(update);
    }

    // Start Game Loop
    update();
</script>

</body>
</html>
