<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blind Echo - Unique Game</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            max-width: 600px;
            padding: 30px;
            border: 2px solid #00ff66;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            background-color: #0a0a0a;
        }
        h1 {
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
        .status-box {
            font-size: 18px;
            margin: 20px 0;
            min-height: 60px;
            line-height: 1.5;
        }
        .btn-choice {
            background-color: transparent;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .btn-choice:hover {
            background-color: #00ff66;
            color: #000;
            box-shadow: 0 0 15px #00ff66;
        }
        .score {
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🔊 THE BLIND ECHO</h1>
    <p>Aap aik bilkul andheri jagah hain. Sirf aawaz sun kar rasta dhoondhein!</p>
    <hr style="border-color: #333;">
    
    <div class="status-box" id="game-text">
        Click "Start Game" to begin the mystery...
    </div>

    <div id="choices-container">
        <button class="btn-choice" onclick="startGame()">Start Game</button>
    </div>

    <div class="score">Steps Survived: <span id="score-count">0</span></div>
</div>

<script>
    let score = 0;
    
    // Alag alag ajeeb aawazein aur un ke choices
    const scenarios = [
        {
            text: "Aap ko samne se kisi ke bhaagne ki bhayanak aawaz aayi... 🏃‍♂️",
            choices: [
                { text: "Bhaag kar peche chhup jao", correct: true },
                { text: "Samne seedhe bhago", correct: false },
                { text: "Khamosh khare raho", correct: false }
            ]
        },
        {
            text: "Baayein (Left) taraf se paani tapakne ki aawaz aa rahi hai... 💧",
            choices: [
                { text: "Daayein (Right) taraf jao", correct: true },
                { text: "Paani ki taraf jao", correct: false },
                { text: "Zameen par baith jao", correct: false }
            ]
        },
        {
            text: "Zameen ke neeche se ajeeb garajne ki aawaz aayi, jaise zameen toot rahi ho... 🌋",
            choices: [
                { text: "Ooper kisi cheez ko pakad kar latak jao", correct: true },
                { text: "Tezi se aage chhalaang lagao", correct: false },
                { text: "Wahin ruk jao", correct: false }
            ]
        },
        {
            text: "Aap ke bilkul kaan ke paas kisi ne dheere se phoonk maari... 👻",
            choices: [
                { text: "Tezi se ghoom kar mukka maaro", correct: false },
                { text: "Bina peeche dekhe daayein bhago", correct: true },
                { text: "Zoor se chillo", correct: false }
            ]
        }
    ];

    function startGame() {
        score = 0;
        document.getElementById('score-count').innerText = score;
        nextTurn();
    }

    function nextTurn() {
        // Randomly aik scenario select hoga
        let randomScenario = scenarios[Math.floor(Math.random() * scenarios.length)];
        
        document.getElementById('game-text').innerText = randomScenario.text;
        
        let choicesHTML = '';
        randomScenario.choices.forEach(choice => {
            choicesHTML += `<button class="btn-choice" onclick="handleChoice(${choice.correct})">${choice.text}</button>`;
        });
        
        document.getElementById('choices-container').innerHTML = choicesHTML;
    }

    function handleChoice(isCorrect) {
        if (isCorrect) {
            score++;
            document.getElementById('score-count').innerText = score;
            document.getElementById('game-text').style.color = "#00ff66";
            document.getElementById('game-text').innerText = "Sahi Faisla! Aap bach gaye. Agli aawaz sunien...";
            
            setTimeout(() => {
                nextTurn();
            }, 1500);
        } else {
            document.getElementById('game-text').style.color = "#ff0055";
            document.getElementById('game-text').innerText = "💥 GHALAT FAISLA! Aap andhere me maare gaye.";
            document.getElementById('choices-container').innerHTML = `<button class="btn-choice" onclick="startGame()">Try Again</button>`;
        }
    }
</script>

</body>
</html>
