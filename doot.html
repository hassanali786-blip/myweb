 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Zombie Shooter (Mobile & PC)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game-ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ff3333;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 51, 51, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border: 3px solid #ff3333;
            border-radius: 10px;
            cursor: pointer;
            z-index: 20;
            width: 80%;
            max-width: 400px;
        }
        #instructions h1 { color: #ff3333; margin-top: 0; font-size: 24px; }
        #instructions p { font-size: 15px; line-height: 1.6; }

        /* Mobile Controls Styling */
        .mobile-btn {
            display: none; /* Hidden on PC, shown on mobile via JS */
            position: absolute;
            z-index: 15;
            background: rgba(255, 0, 0, 0.4);
            border: 3px solid #ff3333;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        #shoot-btn {
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            line-height: 74px;
            font-size: 18px;
            text-shadow: 1px 1px #000;
        }
        /* Virtual Joystick area indicator */
        #joystick-area {
            display: none;
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        HP: <span id="hp">100</span>% | SCORE: <span id="score">0</span>
    </div>
    <div id="crosshair"></div>

    <div id="instructions">
        <h1>ZOMBIE SURVIVAL 3D</h1>
        <p id="inst-text">
            <strong>CLICK / TOUCH TO START</strong><br><br>
            [PC Controls]:<br>
            Move: W,A,S,D | Look: Mouse | Shoot: Click<br><br>
            [Mobile Controls]:<br>
            Left Side Screen: Move<br>
            Right Side Screen: Look Around<br>
            Red Button: FIRE!
        </p>
    </div>

    <!-- Mobile Shoot Button -->
    <div id="shoot-btn" class="mobile-btn">FIRE</div>
    <div id="joystick-area"></div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let camera, scene, renderer;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let isPlaying = false;

        let zombies = [];
        let bullets = [];
        let gunMesh;
        let score = 0;
        let health = 100;
        let canShoot = true;

        // Mobile Touch Variables
        let isMobile = false;
        let moveTouchId = null;
        let moveStartX = 0, moveStartY = 0;
        let lookTouchId = null;
        let lookStartX = 0, lookStartY = 0;

        // Audio setup (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playGunSound() {
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch(e) {}
        }

        // Detect Mobile Device
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            isMobile = true;
            document.getElementById('shoot-btn').style.display = 'block';
            document.getElementById('joystick-area').style.display = 'block';
        }

        const instructions = document.getElementById('instructions');

        // Start Game Event
        instructions.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (!isMobile) {
                document.body.requestPointerLock();
            } else {
                instructions.style.display = 'none';
                isPlaying = true;
            }
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                instructions.style.display = 'none';
                isPlaying = true;
            } else {
                instructions.style.display = 'block';
                isPlaying = false;
            }
        });

        init();
        animate();

        function init() {
            // Camera & Scene
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 10;
            camera.rotation.order = 'YXZ'; // Important for rotation calculations

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0303);
            scene.fog = new THREE.FogExp2(0x0a0303, 0.015);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x221111);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xff0000, 0.5);
            dirLight.position.set(0, 50, 0);
            scene.add(dirLight);

            // Floor
            const floorGeo = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            floorGeo.rotateX(-Math.PI / 2);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x111111, wireframe: true });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            scene.add(floor);

            // Pillars
            const wallGeo = new THREE.BoxGeometry(15, 60, 15);
            const wallMat = new THREE.MeshBasicMaterial({ color: 0x330000 });
            for(let i = 0; i < 40; i++) {
                const wall = new THREE.Mesh(wallGeo, wallMat);
                wall.position.x = Math.floor(Math.random() * 20 - 10) * 40;
                wall.position.z = Math.floor(Math.random() * 20 - 10) * 40;
                wall.position.y = 30;
                scene.add(wall);
            }

            // Gun
            const gunGeo = new THREE.BoxGeometry(1, 1, 5);
            const gunMat = new THREE.MeshBasicMaterial({ color: 0x444444 });
            gunMesh = new THREE.Mesh(gunGeo, gunMat);
            gunMesh.position.set(1.5, -1.5, -3);
            camera.add(gunMesh);
            scene.add(camera);

            // PC Controls
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // PC Mouse Looking
            document.addEventListener('mousemove', (e) => {
                if (!isPlaying || isMobile) return;
                camera.rotation.y -= e.movementX * 0.0025;
                camera.rotation.x -= e.movementY * 0.0025;
                camera.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, camera.rotation.x));
            });

            // PC Shoot
            document.addEventListener('mousedown', (e) => {
                if (isPlaying && !isMobile && canShoot) {
                    shootGun();
                }
            });

            // --- MOBILE TOUCH LOGIC ---
            if (isMobile) {
                window.addEventListener('touchstart', (e) => {
                    if (!isPlaying) return;
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        let touch = e.changedTouches[i];
                        
                        // Ignore touches on HTML Buttons
                        if (touch.target.id === 'shoot-btn') continue;

                        // Left Half Screen = Movement Joystick
                        if (touch.clientX < window.innerWidth / 2 && moveTouchId === null) {
                            moveTouchId = touch.identifier;
                            moveStartX = touch.clientX;
                            moveStartY = touch.clientY;
                        } 
                        // Right Half Screen = Looking Around
                        else if (touch.clientX >= window.innerWidth / 2 && lookTouchId === null) {
                            lookTouchId = touch.identifier;
                            lookStartX = touch.clientX;
                            lookStartY = touch.clientY;
                        }
                    }
                }, {passive: true});

                window.addEventListener('touchmove', (e) => {
                    if (!isPlaying) return;
                    for (let i = 0; i < e.touches.length; i++) {
                        let touch = e.touches[i];

                        if (touch.identifier === moveTouchId) {
                            let diffX = touch.clientX - moveStartX;
                            let diffY = touch.clientY - moveStartY;

                            // Threshold for walking
                            moveForward = diffY < -20;
                            moveBackward = diffY > 20;
                            moveLeft = diffX < -20;
                            moveRight = diffX > 20;
                        }

                        if (touch.identifier === lookTouchId) {
                            let diffX = touch.clientX - lookStartX;
                            let diffY = touch.clientY - lookStartY;

                            // Rotate Camera based on swipe speed
                            camera.rotation.y -= diffX * 0.005;
                            camera.rotation.x -= diffY * 0.005;
                            camera.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, camera.rotation.x));

                            lookStartX = touch.clientX;
                            lookStartY = touch.clientY;
                        }
                    }
                }, {passive: true});

                window.addEventListener('touchend', (e) => {
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        let touch = e.changedTouches[i];
                        if (touch.identifier === moveTouchId) {
                            moveTouchId = null;
                            moveForward = moveBackward = moveLeft = moveRight = false;
                        }
                        if (touch.identifier === lookTouchId) {
                            lookTouchId = null;
                        }
                    }
                });

                // Mobile Shoot Button Event
                const shootBtn = document.getElementById('shoot-btn');
                shootBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (isPlaying && canShoot) {
                        shootGun();
                    }
                });
            }

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);

            // Zombie Spawn System
            setInterval(spawnZombie, 1500);
        }

        function shootGun() {
            canShoot = false;
            playGunSound();

            // Recoil effect
            gunMesh.scale.set(1.2, 1.2, 0.8);
            setTimeout(() => gunMesh.scale.set(1, 1, 1), 50);

            // Bullet
            const bulletGeo = new THREE.SphereGeometry(0.4, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            
            bullet.position.copy(camera.position);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            bullet.velocity = dir.multiplyScalar(220); // Velocity
            
            scene.add(bullet);
            bullets.push(bullet);

            setTimeout(() => { canShoot = true; }, 200); // Fire rate
        }

        function spawnZombie() {
            if(!isPlaying) return;

            const zombieGeo = new THREE.BoxGeometry(6, 12, 6);
            const zombieMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 }); // Green Zombies
            const zombie = new THREE.Mesh(zombieGeo, zombieMat);

            const angle = Math.random() * Math.PI * 2;
            const distance = 140 + Math.random() * 60;
            zombie.position.x = camera.position.x + Math.cos(angle) * distance;
            zombie.position.z = camera.position.z + Math.sin(angle) * distance;
            zombie.position.y = 6;
            
            scene.add(zombie);
            zombies.push(zombie);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                // Movement Physics
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                camera.translateX(-velocity.x * delta);
                camera.translateZ(velocity.z * delta);
                camera.position.y = 10; // Stay on ground

                // Bullet Movement & Collision
                for(let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    b.position.addScaledVector(b.velocity, delta);

                    if(b.position.distanceTo(camera.position) > 400) {
                        scene.remove(b);
                        bullets.splice(i, 1);
                        continue;
                    }

                    for(let j = zombies.length - 1; j >= 0; j--) {
                        let z = zombies[j];
                        if(b.position.distanceTo(z.position) < 8) {
                            scene.remove(z);
                            zombies.splice(j, 1);
                            scene.remove(b);
                            bullets.splice(i, 1);
                            
                            score += 50;
                            document.getElementById('score').innerText = score;
                            break;
                        }
                    }
                }

                // Zombie Movement & Damage
                for(let i = zombies.length - 1; i >= 0; i--) {
                    let z = zombies[i];
                    let dir = new THREE.Vector3().subVectors(camera.position, z.position);
                    dir.y = 0;
                    dir.normalize();
                    z.position.addScaledVector(dir, 35 * delta); // Chase speed

                    if(z.position.distanceTo(camera.position) < 10) {
                        health -= 1;
                        document.getElementById('hp').innerText = Math.max(0, health);
                        
                        if(health <= 0) {
                            alert("Game Over! Your score: " + score);
                            location.reload();
                        }
                    }
                }

                prevTime = time;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
