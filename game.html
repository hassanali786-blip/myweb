<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humans Vs Robots: Cyber Evolution</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 1s ease;
        }

        h1 {
            margin: 5px 0;
            font-size: 24px;
            text-shadow: 0 0 10px var(--neon-color, #00ffcc);
            transition: text-shadow 1s ease;
        }

        #ui-container {
            display: flex;
            gap: 20px;
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .ui-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 5px;
            border: 1px solid var(--neon-color, #00ffcc);
            box-shadow: 0 0 5px var(--neon-color, #00ffcc);
            transition: border 1s ease, box-shadow 1s ease;
        }

        canvas {
            background-color: #111;
            border: 4px solid #00ffcc;
            border-radius: 10px;
            box-shadow: 0 0 25px #00ffcc;
            display: block;
            transition: border-color 1s ease, box-shadow 1s ease;
        }

        #controls-info {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
        }

        #game-over-screen {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            width: 800px;
            height: 500px;
            border-radius: 10px;
            z-index: 10;
        }

        #game-over-screen h2 {
            font-size: 40px;
            color: #ff3333;
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px #ff0000;
        }

        button {
            background: #ff0055;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff0055;
            transition: 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: #ff3377;
        }
    </style>
</head>
<body>

    <h1 id="game-title">🤖 CYBER ARENA: EVOLUTION 🧑</h1>

    <div id="ui-container">
        <div class="ui-box">Level: <span id="level-val">1</span></div>
        <div class="ui-box">Kills: <span id="kills-val">0</span></div>
        <div class="ui-box">HP: <span id="hp-val">100</span>%</div>
        <div class="ui-box">Lives: <span id="lives-val">3</span></div>
    </div>

    <div style="position: relative;">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="game-over-screen" id="gov-screen">
            <h2 id="gov-title">GAME OVER</h2>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div id="controls-info">
        Use <b>W, A, S, D</b> or <b>Arrow Keys</b> to Move | <b>Spacebar</b> to Jump | Click <b>Mouse</b> to Shoot
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const govScreen = document.getElementById('game-over-screen');
        const govTitle = document.getElementById('gov-title');

        // Game State Variables
        let level = 1;
        let kills = 0;
        let lives = 3;
        let gameActive = true;

        // Player Object
        const player = {
            x: 100,
            y: 400,
            width: 25,
            height: 45,
            hp: 100,
            speed: 5,
            vx: 0,
            vy: 0,
            isJumping: false,
            color: '#66fcf1'
        };

        const gravity = 0.6;
        const floorY = 440; // Ground Level

        // Game Entities
        let bullets = [];
        let enemies = [];
        let particles = [];

        // Keyboard Controls
        const keys = {};

        // Mouse Controls
        let mouseX = 0;
        let mouseY = 0;

        // Enemy Types Configuration
        const ENEMY_TYPES = {
            EASY: { hp: 1, speed: 1.5, color: '#00ffcc', size: 20, points: 1 },
            MEDIUM: { hp: 3, speed: 2.2, color: '#ffcc00', size: 24, points: 2 },
            HARD: { hp: 6, speed: 3.0, color: '#ff3300', size: 28, points: 3 },
            BOSS: { hp: 100, speed: 1.2, color: '#ff0055', size: 55, points: 10 } // Level 100 Giant Enemy
        };

        // 10 Different Themes (Changes every 10 Levels)
        const THEMES = [
            { background: '#0b0c10', canvasBg: '#111', neon: '#66fcf1' }, // Lv 1-10 (Cyan)
            { background: '#12001c', canvasBg: '#1b0024', neon: '#d946ef' }, // Lv 11-20 (Magenta/Purple)
            { background: '#001a09', canvasBg: '#02240f', neon: '#22c55e' }, // Lv 21-30 (Green)
            { background: '#1c1c00', canvasBg: '#2b2b02', neon: '#eab308' }, // Lv 31-40 (Yellow)
            { background: '#1a0000', canvasBg: '#240202', neon: '#ef4444' }, // Lv 41-50 (Red)
            { background: '#000c1a', canvasBg: '#021830', neon: '#3b82f6' }, // Lv 51-60 (Blue)
            { background: '#001c1c', canvasBg: '#022b2b', neon: '#06b6d4' }, // Lv 61-70 (Cyan Dark)
            { background: '#1c0e00', canvasBg: '#2b1602', neon: '#f97316' }, // Lv 71-80 (Orange)
            { background: '#171717', canvasBg: '#262626', neon: '#f5f5f5' }, // Lv 81-90 (Silver/White)
            { background: '#000000', canvasBg: '#0a0002', neon: '#ff0040' }  // Lv 91-100 (Hell Red / Boss Stage)
        ];

        // Apply Graphic Changes Based on Level
        function updateGraphicsTheme() {
            let themeIndex = Math.floor((level - 1) / 10);
            if (themeIndex > 9) themeIndex = 9; // Cap at theme 10

            const activeTheme = THEMES[themeIndex];
            
            // Update HTML/CSS styles
            document.documentElement.style.setProperty('--neon-color', activeTheme.neon);
            document.body.style.backgroundColor = activeTheme.background;
            canvas.style.borderColor = activeTheme.neon;
            canvas.style.boxShadow = `0 0 25px ${activeTheme.neon}`;
            
            player.color = activeTheme.neon;
        }

        // Spawn System
        function spawnEnemies() {
            enemies = [];
            
            // Level 100 Boss Battle Special Event
            if (level === 100) {
                enemies.push({
                    x: 650,
                    y: floorY - ENEMY_TYPES.BOSS.size,
                    hp: ENEMY_TYPES.BOSS.hp,
                    maxHp: ENEMY_TYPES.BOSS.hp,
                    speed: ENEMY_TYPES.BOSS.speed,
                    color: ENEMY_TYPES.BOSS.color,
                    size: ENEMY_TYPES.BOSS.size,
                    isBoss: true,
                    points: ENEMY_TYPES.BOSS.points,
                    dir: -1
                });
                return;
            }

            // Normal levels difficulty scaling
            // More enemies spawn as levels increase
            let enemyCount = 3 + Math.floor(level * 0.4); 

            for (let i = 0; i < enemyCount; i++) {
                // Determine enemy type based on current level range
                let type = ENEMY_TYPES.EASY;
                let rand = Math.random() * 100;

                if (level > 40) {
                    if (rand > 70) type = ENEMY_TYPES.HARD;
                    else if (rand > 30) type = ENEMY_TYPES.MEDIUM;
                } else if (level > 15) {
                    if (rand > 60) type = ENEMY_TYPES.MEDIUM;
                }

                // Place them on the right side initially
                let spawnX = 400 + Math.random() * 350;
                
                enemies.push({
                    x: spawnX,
                    y: floorY - type.size,
                    hp: type.hp + Math.floor(level / 15), // enemies get slightly tankier
                    maxHp: type.hp + Math.floor(level / 15),
                    speed: type.speed + (level * 0.02),   // enemies get faster
                    color: type.color,
                    size: type.size,
                    isBoss: false,
                    points: type.points,
                    dir: -1
                });
            }
        }

        // Event Listeners
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', () => {
            if (!gameActive) return;

            // Shoot bullet towards mouse pointer angle
            const angle = Math.atan2(mouseY - (player.y + player.height/2), mouseX - (player.x + player.width/2));
            bullets.push({
                x: player.x + player.width / 2,
                y: player.y + player.height / 2,
                vx: Math.cos(angle) * 10,
                vy: Math.sin(angle) * 10,
                size: 6,
                color: '#fff'
            });
        });

        // Particle Effect Generator
        function createExplosion(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 30,
                    maxLife: 30,
                    size: Math.random() * 4 + 2,
                    color: color
                });
            }
        }

        // Main Game Reset
        function resetGame() {
            level = 1;
            kills = 0;
            lives = 3;
            player.hp = 100;
            player.x = 100;
            player.y = floorY - player.height;
            bullets = [];
            particles = [];
            
            updateGraphicsTheme();
            spawnEnemies();
            
            gameActive = true;
            govScreen.style.display = 'none';
        }

        // Level Transition
        function nextLevel() {
            level++;
            if (level > 100) {
                // Game Won Screen
                gameActive = false;
                govTitle.innerText = "🏆 VICTORY! 🏆\nYou Saved Earth!";
                govScreen.style.display = 'flex';
                return;
            }
            
            player.x = 100; // Reset player position to start of stage
            bullets = [];
            
            updateGraphicsTheme();
            spawnEnemies();
        }

        // Main Update Loop
        function update() {
            if (!gameActive) return;

            // Player lateral movement
            if (keys['KeyA'] || keys['ArrowLeft']) {
                player.vx = -player.speed;
            } else if (keys['KeyD'] || keys['ArrowRight']) {
                player.vx = player.speed;
            } else {
                player.vx = 0;
            }

            // Jumping mechanics
            if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && !player.isJumping) {
                player.vy = -12;
                player.isJumping = true;
            }

            // Apply movement & gravity
            player.x += player.vx;
            player.vy += gravity;
            player.y += player.vy;

            // Constrain player within screen boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Ground Collision
            if (player.y + player.height >= floorY) {
                player.y = floorY - player.height;
                player.vy = 0;
                player.isJumping = false;
            }

            // Update Bullets
            bullets.forEach((bullet, index) => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                // Out of screen delete
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(index, 1);
                }
            });

            // Update Enemies
            enemies.forEach((enemy, eIdx) => {
                // Enemies move towards the player
                if (enemy.x > player.x) {
                    enemy.x -= enemy.speed;
                } else {
                    enemy.x += enemy.speed;
                }

                // Enemy Collision with Player
                if (enemy.x < player.x + player.width &&
                    enemy.x + enemy.size > player.x &&
                    enemy.y < player.y + player.height &&
                    enemy.y + enemy.size > player.y) {
                    
                    // Deduct HP when touched
                    player.hp -= enemy.isBoss ? 2.5 : 0.5; 
                    createExplosion(player.x + player.width/2, player.y + player.height/2, '#ff3333', 3);

                    if (player.hp <= 0) {
                        lives--;
                        player.hp = 100; // Reset HP bar
                        player.x = 100; // Back to spawn
                        
                        if (lives < 0) {
                            gameActive = false;
                            govTitle.innerText = "GAME OVER 💀";
                            govScreen.style.display = 'flex';
                        }
                    }
                }

                // Enemy collision with Bullets
                bullets.forEach((b, bIdx) => {
                    if (b.x > enemy.x && b.x < enemy.x + enemy.size &&
                        b.y > enemy.y && b.y < enemy.y + enemy.size) {
                        
                        bullets.splice(bIdx, 1);
                        enemy.hp--;
                        createExplosion(b.x, b.y, enemy.color, 5);

                        if (enemy.hp <= 0) {
                            createExplosion(enemy.x + enemy.size/2, enemy.y + enemy.size/2, enemy.color, 25);
                            enemies.splice(eIdx, 1);
                            kills += enemy.points;

                            // Level Cleared!
                            if (enemies.length === 0) {
                                nextLevel();
                            }
                        }
                    }
                });
            });

            // Update Particles
            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(idx, 1);
            });

            // Update UI Counters
            document.getElementById('level-val').innerText = level;
            document.getElementById('kills-val').innerText = kills;
            document.getElementById('hp-val').innerText = Math.round(player.hp);
            document.getElementById('lives-val').innerText = lives >= 0 ? lives : 0;
        }

        // Main Draw Render Loop
        function draw() {
            // Background Clear
            let themeIndex = Math.floor((level - 1) / 10);
            if (themeIndex > 9) themeIndex = 9;
            ctx.fillStyle = THEMES[themeIndex].canvasBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Ground (Zameen)
            ctx.fillStyle = '#1c1c1c';
            ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);
            
            // Draw Ground Neon Line border
            ctx.strokeStyle = THEMES[themeIndex].neon;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, floorY);
            ctx.lineTo(canvas.width, floorY);
            ctx.stroke();

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Player Eye/Visor
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 10, player.y + 10, 10, 5);
            ctx.shadowBlur = 0; // Reset glow

            // Draw Enemies
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
                ctx.shadowBlur = 0;

                // Draw Mini HP bar over Enemy
                if (enemy.hp < enemy.maxHp) {
                    ctx.fillStyle = '#ff0033';
                    ctx.fillRect(enemy.x, enemy.y - 10, enemy.size, 4);
                    ctx.fillStyle = '#00ff66';
                    ctx.fillRect(enemy.x, enemy.y - 10, enemy.size * (enemy.hp / enemy.maxHp), 4);
                }
            });

            // Draw Bullets
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1.0; // Reset transparency
        }

        // Main Game Loop Runner
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Start the Game Initializer
        updateGraphicsTheme();
        spawnEnemies();
        loop();
    </script>
</body>
</html>
