<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Humans Vs Robots: 3D Cyber Survival</title>
    <style>
        body {
            margin: 0;
            background-color: #080911;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* Mobile touch defaults disable karne ke liye */
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            background-color: #0f111a;
            background-image: radial-gradient(circle, #1a1c2e 1px, transparent 1px);
            background-size: 25px 25px;
            border: 3px solid #00ffcc;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
            max-width: 95vw;
            max-height: 60vh;
        }
        .scoreboard {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        .health-bar-container {
            width: 140px;
            background-color: #222;
            border-radius: 6px;
            display: inline-block;
            overflow: hidden;
            height: 14px;
            vertical-align: middle;
            border: 2px solid #fff;
        }
        .health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00ffaa, #00b374);
        }
        /* Mobile Controls Styling */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 500px;
            margin-top: 15px;
        }
        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 255, 204, 0.2);
            border: 2px solid #00ffcc;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
        }
        .touch-btn:active {
            background: rgba(0, 255, 204, 0.5);
        }
        #restart-btn {
            display: none;
            margin-top: 10px;
            background: #ff0055;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h3 style="margin: 5px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc;">🤖 HUMANS VS ROBOTS 🧑</h3>
    
    <div class="scoreboard">
        Kills: <span id="score" style="color: #ff0055;">0</span> | 
        HP: <div class="health-bar-container"><div id="health" class="health-bar"></div></div>
    </div>

    <canvas id="gameCanvas" width="800" height="480"></canvas>
    
    <button id="restart-btn" onclick="resetGame()">Play Again</button>

    <!-- Mobile Touch Pads -->
    <div class="mobile-controls">
        <div class="touch-btn" id="move-pad">MOVE</div>
        <div class="touch-btn" id="fire-pad" style="background: rgba(255, 0, 85, 0.2); border-color: #ff0055;">FIRE</div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player, bullets, enemies, keys, isGameOver;

    function resetGame() {
        player = { x: 400, y: 240, size: 16, speed: 4, health: 100, kills: 0, angle: 0 };
        bullets = [];
        enemies = [];
        keys = {};
        isGameOver = false;
        document.getElementById("restart-btn").style.display = "none";
        document.getElementById("score").innerText = "0";
        document.getElementById("health").style.width = "100%";
    }
    resetGame();

    // Keyboard Listeners (for Laptop)
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    // Mouse Controls (for Laptop)
    canvas.addEventListener("mousemove", e => {
        let rect = canvas.getBoundingClientRect();
        let mX = (e.clientX - rect.left) * (canvas.width / rect.width);
        let mY = (e.clientY - rect.top) * (canvas.height / rect.height);
        player.angle = Math.atan2(mY - player.y, mX - player.x);
    });
    canvas.addEventListener("mousedown", () => { if(!isGameOver) fireBullet(); });

    // Mobile Touch Controls
    const movePad = document.getElementById("move-pad");
    const firePad = document.getElementById("fire-pad");

    let mobileMoving = false;
    movePad.addEventListener("touchstart", (e) => { mobileMoving = true; e.preventDefault(); });
    movePad.addEventListener("touchend", (e) => { mobileMoving = false; e.preventDefault(); });
    
    firePad.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if(!isGameOver) {
            // Mobile automatic aiming at the nearest enemy
            if(enemies.length > 0) {
                let nearest = enemies[0];
                let minDist = Math.hypot(nearest.x - player.x, nearest.y - player.y);
                enemies.forEach(en => {
                    let d = Math.hypot(en.x - player.x, en.y - player.y);
                    if(d < minDist) { minDist = d; nearest = en; }
                });
                player.angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
            }
            fireBullet();
        }
    });

    function fireBullet() {
        bullets.push({
            x: player.x + Math.cos(player.angle) * 18,
            y: player.y + Math.sin(player.angle) * 18,
            vX: Math.cos(player.angle) * 9,
            vY: Math.sin(player.angle) * 9,
            angle: player.angle
        });
    }

    // Spawn Enemies
    function spawnRobot() {
        if (enemies.length < 6 && !isGameOver) {
            let side = Math.floor(Math.random() * 4);
            let x, y;
            if (side === 0) { x = -20; y = Math.random() * canvas.height; }
            else if (side === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
            else if (side === 2) { x = Math.random() * canvas.width; y = -20; }
            else { x = Math.random() * canvas.width; y = canvas.height + 20; }
            enemies.push({ x: x, y: y, size: 20, speed: 1.5 + Math.random() * 1 });
        }
    }
    setInterval(spawnRobot, 1200);

    function update() {
        if (player.health <= 0) {
            isGameOver = true;
            ctx.fillStyle = "rgba(8, 9, 17, 0.95)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0055";
            ctx.font = "bold 30px Arial";
            ctx.fillText("❌ GAME OVER ❌", canvas.width/2 - 120, canvas.height/2);
            document.getElementById("restart-btn").style.display = "block";
            requestAnimationFrame(update);
            return;
        }

        // Laptop Movement
        if (keys['w'] && player.y > player.size) player.y -= player.speed;
        if (keys['s'] && player.y < canvas.height - player.size) player.y += player.speed;
        if (keys['a'] && player.x > player.size) player.x -= player.speed;
        if (keys['d'] && player.x < canvas.width - player.size) player.x += player.speed;

        // Mobile Movement (Moves player towards where his angle points)
        if (mobileMoving) {
            player.x += Math.cos(player.angle) * player.speed;
            player.y += Math.sin(player.angle) * player.speed;
            // Bound checking
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 🧑 DRAW 3D HUMAN
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);
        ctx.fillStyle = "#1b4d3e";
        ctx.fillRect(-10, -15, 20, 30);
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fillStyle = "#00ffaa";
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.fillRect(3, -3, 3, 6); // Helmet
        ctx.fillStyle = "#444";
        ctx.fillRect(6, 5, 14, 5); // Gun
        ctx.restore();

        // ⚡ DRAW LASERS
        bullets.forEach((bullet, bIndex) => {
            bullet.x += bullet.vX;
            bullet.y += bullet.vY;
            ctx.fillStyle = "#00ffcc";
            ctx.fillRect(bullet.x - 4, bullet.y - 2, 8, 4);
            if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                bullets.splice(bIndex, 1);
            }
        });

        // 🤖 DRAW 3D ROBOTS
        enemies.forEach((robot, eIndex) => {
            let rAngle = Math.atan2(player.y - robot.y, player.x - robot.x);
            robot.x += Math.cos(rAngle) * robot.speed;
            robot.y += Math.sin(rAngle) * robot.speed;

            ctx.save();
            ctx.translate(robot.x, robot.y);
            ctx.rotate(rAngle);
            ctx.fillStyle = "#222533";
            ctx.fillRect(-12, -12, 24, 24);
            ctx.fillStyle = "#ff0055";
            ctx.fillRect(5, -6, 4, 12); // Robot Eye
            ctx.restore();

            // Collision with Human
            if (Math.hypot(player.x - robot.x, player.y - robot.y) < player.size + robot.size - 5) {
                player.health -= 0.5;
                document.getElementById("health").style.width = Math.max(0, player.health) + "%";
            }

            // Laser hit Robot
            bullets.forEach((bullet, bIndex) => {
                if (Math.hypot(robot.x - bullet.x, robot.y - bullet.y) < robot.size + 4) {
                    enemies.splice(eIndex, 1);
                    bullets.splice(bIndex, 1);
                    player.kills++;
                    document.getElementById("score").innerText = player.kills;
                }
            });
        });

        requestAnimationFrame(update);
    }
    update();
</script>

</body>
</html>
