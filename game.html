 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Arena: Evolution Pro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 1s ease;
            user-select: none;
            touch-action: none;
        }

        h1 {
            margin: 5px 0;
            font-size: 22px;
            text-shadow: 0 0 10px var(--neon-color, #00ffcc);
        }

        #ui-container {
            display: flex;
            gap: 10px;
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: bold;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ui-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 5px;
            border: 1px solid var(--neon-color, #00ffcc);
            box-shadow: 0 0 5px var(--neon-color, #00ffcc);
        }

        #canvas-container {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            max-width: 100%;
        }

        canvas {
            background-color: #111;
            border: 4px solid #00ffcc;
            border-radius: 10px;
            box-shadow: 0 0 25px #00ffcc;
            display: block;
            max-width: 100vw;
            max-height: 60vh;
        }

        /* Screen Popups */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            width: 100%;
            height: 100%;
            border-radius: 10px;
            z-index: 10;
            text-align: center;
        }

        .overlay-screen h2 {
            font-size: 38px;
            color: #ff3333;
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px #ff0000;
        }

        #level-up-screen h2 {
            color: #00ffcc;
            text-shadow: 0 0 15px #00ffcc;
        }

        button {
            background: #ff0055;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff0055;
            transition: 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        #next-lvl-btn {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 15px #00ffcc;
        }

        /* Mobile Controls Layout */
        #mobile-controls {
            display: none;
            width: 100%;
            max-width: 800px;
            justify-content: space-between;
            padding: 10px 20px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .touch-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid var(--neon-color, #00ffcc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: white;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .touch-btn:active {
            background: rgba(0, 255, 255, 0.4);
            transform: scale(0.9);
        }

        #fire-btn {
            background: rgba(255, 50, 50, 0.3);
            border-color: #ff3333;
            width: 70px;
            height: 70px;
        }

        #controls-info {
            margin-top: 5px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 id="game-title">🤖 CYBER ARENA: EVOLUTION 🧑</h1>

    <div id="ui-container">
        <div class="ui-box">Level: <span id="level-val">1</span></div>
        <div class="ui-box">Kills: <span id="kills-val">0</span></div>
        <div class="ui-box">HP: <span id="hp-val">100</span>%</div>
        <div class="ui-box">Lives: <span id="lives-val">3</span></div>
        <div class="ui-box" id="mode-box" style="color: #00ffcc;">Normal Mode</div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay-screen">
            <h2 id="gov-title">GAME OVER</h2>
            <button onclick="resetGame()">Play Again</button>
        </div>

        <!-- Level Up Pop-up Screen -->
        <div id="level-up-screen" class="overlay-screen">
            <h2>LEVEL CLEARED! 🎉</h2>
            <p style="font-size: 18px; margin-bottom: 25px;">Tayyar ho jao aglay dushmanon ke liye!</p>
            <button id="next-lvl-btn" onclick="startNextLevel()">Next Level ➡️</button>
        </div>
    </div>

    <!-- Mobile Screen Buttons -->
    <div id="mobile-controls">
        <div class="btn-group">
            <div class="touch-btn" id="btn-left">◀</div>
            <div class="touch-btn" id="btn-right">▶</div>
            <div class="touch-btn" id="btn-up">▲</div>
        </div>
        <div class="btn-group">
            <div class="touch-btn" id="btn-dash" style="font-size: 12px; background: rgba(0, 255, 200, 0.2);">DASH</div>
            <div class="touch-btn" id="fire-btn">🔥</div>
        </div>
    </div>

    <div id="controls-info">
        PC: <b>WASD/Arrows</b> to Move | <b>Space</b> Jump | <b>Shift</b> Dash | <b>Mouse Click</b> Shoot
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const govScreen = document.getElementById('game-over-screen');
        const lvlScreen = document.getElementById('level-up-screen');
        const govTitle = document.getElementById('gov-title');
        const modeBox = document.getElementById('mode-box');

        // Show Mobile Controls if touchscreen detected
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('mobile-controls').style.display = 'flex';
        }

        // Game State Variables
        let level = 1;
        let kills = 0;
        let lives = 3;
        let gameActive = true;
        let shakeTime = 0;
        let shakeIntensity = 0;
        
        // Hit-Freeze (Recovery/Rukne wala effect)
        let freezeFrames = 0; 

        // Player Object
        const player = {
            x: 100,
            y: 400,
            width: 28,
            height: 50,
            hp: 100,
            speed: 5.5,
            vx: 0,
            vy: 0,
            isJumping: false,
            color: '#66fcf1',
            facing: 1, // 1 for Right, -1 for Left
            
            // Invincibility after hit
            invincibleTimer: 0,

            // Advanced Mode System
            isAdvanced: false,
            advancedTimer: 0,

            // Dash system
            dashCooldown: 0,
            dashTime: 0,
            isDashing: false,
            dashSpeed: 18,
            dashDirection: 1,
            dashTrails: [],

            // Weapon state
            activeWeapon: 'PISTOL', 
            weaponTimer: 0
        };

        const gravity = 0.65;
        const floorY = 440; 

        // Game Lists
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let powerups = [];
        let damageTexts = [];

        // Keyboard Controls
        const keys = {};

        // Mouse/Touch Firing Coordinate Tracking
        let mouseX = 600;
        let mouseY = 250;
        let isMouseDown = false;
        let rapidFireCooldown = 0;

        // Enemy Types with Custom Shapes & Drops
        const ENEMY_TYPES = {
            EASY: { hp: 1, speed: 1.6, color: '#00ffcc', size: 24, points: 1, shootRate: 0, aerial: false },
            MEDIUM: { hp: 3, speed: 2.2, color: '#ffcc00', size: 26, points: 2, shootRate: 0.007, aerial: false },
            HARD: { hp: 6, speed: 2.8, color: '#ff3300', size: 28, points: 3, shootRate: 0.015, aerial: false },
            AERIAL: { hp: 2, speed: 1.8, color: '#d946ef', size: 22, points: 2, shootRate: 0.01, aerial: true }, // Girnay wala dushman
            BOSS: { hp: 120, speed: 1.0, color: '#ff0055', size: 60, points: 10, shootRate: 0.04, aerial: false }
        };

        const THEMES = [
            { background: '#0b0c10', canvasBg: '#0f1015', neon: '#66fcf1' }, 
            { background: '#12001c', canvasBg: '#150522', neon: '#d946ef' }, 
            { background: '#001a09', canvasBg: '#041d0f', neon: '#22c55e' }, 
            { background: '#1c1c00', canvasBg: '#212105', neon: '#eab308' }, 
            { background: '#1a0000', canvasBg: '#1f0505', neon: '#ef4444' }, 
            { background: '#000c1a', canvasBg: '#051224', neon: '#3b82f6' }, 
            { background: '#001c1c', canvasBg: '#052222', neon: '#06b6d4' }, 
            { background: '#1c0e00', canvasBg: '#221205', neon: '#f97316' }, 
            { background: '#171717', canvasBg: '#1c1c1c', neon: '#f5f5f5' }, 
            { background: '#000000', canvasBg: '#090103', neon: '#ff0040' }  
        ];

        function applyShake(intensity, duration) {
            shakeIntensity = intensity;
            shakeTime = duration;
        }

        function spawnDamageText(x, y, text, color) {
            damageTexts.push({
                x: x,
                y: y,
                vy: -2 - Math.random() * 2,
                vx: (Math.random() - 0.5) * 2,
                life: 35,
                text: text,
                color: color || '#fff'
            });
        }

        function updateGraphicsTheme() {
            let themeIndex = Math.floor((level - 1) / 10);
            if (themeIndex > 9) themeIndex = 9;

            const activeTheme = THEMES[themeIndex];
            document.documentElement.style.setProperty('--neon-color', activeTheme.neon);
            document.body.style.backgroundColor = activeTheme.background;
            canvas.style.borderColor = activeTheme.neon;
            canvas.style.boxShadow = `0 0 25px ${activeTheme.neon}`;
            if(!player.isAdvanced) player.color = activeTheme.neon;
        }

        function spawnEnemies() {
            enemies = [];
            enemyBullets = [];
            powerups = [];
            
            if (level === 100) {
                enemies.push({
                    x: 650,
                    y: floorY - ENEMY_TYPES.BOSS.size,
                    hp: ENEMY_TYPES.BOSS.hp,
                    maxHp: ENEMY_TYPES.BOSS.hp,
                    speed: ENEMY_TYPES.BOSS.speed,
                    color: ENEMY_TYPES.BOSS.color,
                    size: ENEMY_TYPES.BOSS.size,
                    isBoss: true,
                    aerial: false,
                    points: ENEMY_TYPES.BOSS.points,
                    shootRate: ENEMY_TYPES.BOSS.shootRate,
                    shootCooldown: 0
                });
                return;
            }

            let enemyCount = 3 + Math.floor(level * 0.4); 

            for (let i = 0; i < enemyCount; i++) {
                let type = ENEMY_TYPES.EASY;
                let rand = Math.random() * 100;

                // Pick type based on level
                if (level > 25) {
                    if (rand > 75) type = ENEMY_TYPES.HARD;
                    else if (rand > 50) type = ENEMY_TYPES.AERIAL;
                    else if (rand > 25) type = ENEMY_TYPES.MEDIUM;
                } else if (level > 8) {
                    if (rand > 70) type = ENEMY_TYPES.AERIAL;
                    else if (rand > 35) type = ENEMY_TYPES.MEDIUM;
                }

                let spawnX = 350 + Math.random() * 400;
                let spawnY = type.aerial ? -50 - (Math.random() * 150) : floorY - type.size; // Top spawn for air units
                
                enemies.push({
                    x: spawnX,
                    y: spawnY,
                    targetY: floorY - type.size,
                    hp: type.hp + Math.floor(level / 12), 
                    maxHp: type.hp + Math.floor(level / 12),
                    speed: type.speed + (level * 0.02),   
                    color: type.color,
                    size: type.size,
                    isBoss: false,
                    aerial: type.aerial,
                    descending: type.aerial,
                    points: type.points,
                    shootRate: type.shootRate + (level * 0.0005),
                    shootCooldown: Math.random() * 60
                });
            }
        }

        // --- Keyboard Listener ---
        window.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') triggerDash();
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', () => { isMouseDown = true; fireActiveWeapon(); });
        canvas.addEventListener('mouseup', () => { isMouseDown = false; });

        // --- Touch Buttons Listeners for Mobile ---
        const setupMobileButton = (id, keyCode) => {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyCode] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyCode] = false; });
        };

        setupMobileButton('btn-left', 'KeyA');
        setupMobileButton('btn-right', 'KeyD');
        setupMobileButton('btn-up', 'Space');

        document.getElementById('btn-dash')?.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerDash();
        });

        document.getElementById('fire-btn')?.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // Fire towards enemy closest, or forward based on player facing
            let targetX = player.x + player.facing * 200;
            let targetY = player.y + player.height/2;
            if (enemies.length > 0) {
                targetX = enemies[0].x;
                targetY = enemies[0].y;
            }
            mouseX = targetX;
            mouseY = targetY;
            isMouseDown = true;
            fireActiveWeapon();
        });
        document.getElementById('fire-btn')?.addEventListener('touchend', (e) => {
            e.preventDefault();
            isMouseDown = false;
        });


        function triggerDash() {
            if (player.dashCooldown > 0 || player.isDashing) return;
            
            player.isDashing = true;
            player.dashTime = 12; 
            player.dashCooldown = 45; 
            
            if (keys['KeyA'] || keys['ArrowLeft']) player.dashDirection = -1;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dashDirection = 1;
            else player.dashDirection = player.facing;

            applyShake(4, 8);
        }

        function fireActiveWeapon() {
            if (!gameActive || freezeFrames > 0) return;

            const angle = Math.atan2(mouseY - (player.y + player.height/2), mouseX - (player.x + player.width/2));
            const startX = player.x + player.width / 2;
            const startY = player.y + player.height / 2;

            // Advanced Mode doubles attack and rates
            const multiplier = player.isAdvanced ? 2 : 1;

            if (player.activeWeapon === 'PISTOL') {
                createBullet(startX, startY, angle, 10, 6, '#fff', 1);
                if(player.isAdvanced) {
                    createBullet(startX, startY, angle + 0.1, 10, 6, '#ffd700', 1);
                }
                applyShake(2, 4);
            } 
            else if (player.activeWeapon === 'TRIPLE') {
                createBullet(startX, startY, angle, 11, 6, '#22c55e', 1.2);
                createBullet(startX, startY, angle - 0.15, 11, 6, '#22c55e', 1.2);
                createBullet(startX, startY, angle + 0.15, 11, 6, '#22c55e', 1.2);
                if (player.isAdvanced) {
                    createBullet(startX, startY, angle - 0.3, 11, 5, '#ffd700', 1);
                    createBullet(startX, startY, angle + 0.3, 11, 5, '#ffd700', 1);
                }
                applyShake(4, 6);
            }
            else if (player.activeWeapon === 'PLASMA') {
                let plasmaSize = player.isAdvanced ? 24 : 16;
                let dmg = player.isAdvanced ? 8 : 4;
                createBullet(startX, startY, angle, 7, plasmaSize, '#ef4444', dmg, true); 
                applyShake(8, 12);
            }
        }

        function createBullet(x, y, angle, speed, size, color, dmg, pierces = false) {
            bullets.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: size,
                color: color,
                damage: dmg,
                pierces: pierces,
                hitEnemies: [] 
            });
            createExplosion(x, y, color, 3);
        }

        function createExplosion(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 7,
                    vy: (Math.random() - 0.5) * 7,
                    life: 25 + Math.random() * 15,
                    maxLife: 40,
                    size: Math.random() * 5 + 1.5,
                    color: color
                });
            }
        }

        function resetGame() {
            level = 1;
            kills = 0;
            lives = 3;
            player.hp = 100;
            player.x = 100;
            player.y = floorY - player.height;
            player.activeWeapon = 'PISTOL';
            player.weaponTimer = 0;
            player.isAdvanced = false;
            player.advancedTimer = 0;
            bullets = [];
            enemyBullets = [];
            particles = [];
            damageTexts = [];
            
            updateGraphicsTheme();
            spawnEnemies();
            
            gameActive = true;
            govScreen.style.display = 'none';
            lvlScreen.style.display = 'none';
        }

        function levelClearSequence() {
            // Pause action and show the Popup Screen
            gameActive = false;
            lvlScreen.style.display = 'flex';
        }

        function startNextLevel() {
            level++;
            lvlScreen.style.display = 'none';
            gameActive = true;

            if (level > 100) {
                gameActive = false;
                govTitle.innerText = "🏆 VICTORY! 🏆\nYou Saved Earth!";
                govScreen.style.display = 'flex';
                return;
            }
            
            player.x = 100; 
            bullets = [];
            enemyBullets = [];
            
            updateGraphicsTheme();
            spawnEnemies();
            spawnDamageText(400, 200, "LET'S GO! 🔥", player.color);
        }

        function triggerHitFreeze() {
            // Game 10 frames (approx 0.15s) k liye ruki rhegi recovery k liye
            freezeFrames = 10;
            player.invincibleTimer = 60; // 1 second invincibility
        }

        // Drawing Helper for Human/Enemy Body Parts
        function drawHumanBody(ctx, x, y, width, height, color, isFacingRight, isHitFlash) {
            ctx.save();
            if (isHitFlash && Math.floor(Date.now() / 80) % 2 === 0) {
                ctx.fillStyle = '#ff0000'; // Flash red color
            } else {
                ctx.fillStyle = color;
            }
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;

            // 1. Head
            ctx.beginPath();
            ctx.arc(x + width/2, y + 8, 8, 0, Math.PI * 2);
            ctx.fill();

            // 2. Torso (Body)
            ctx.fillRect(x + width/2 - 6, y + 16, 12, 18);

            // 3. Hands (Aiming direction)
            ctx.fillStyle = '#ffffff';
            let handOffset = isFacingRight ? 8 : -8;
            ctx.fillRect(x + width/2 + handOffset - 3, y + 20, 6, 12);

            // 4. Legs
            ctx.fillStyle = color;
            ctx.fillRect(x + width/2 - 5, y + 34, 4, 16); // Left leg
            ctx.fillRect(x + width/2 + 1, y + 34, 4, 16); // Right leg

            // 5. Eye / Visor
            ctx.fillStyle = '#000';
            let eyeX = isFacingRight ? x + width/2 + 2 : x + width/2 - 6;
            ctx.fillRect(eyeX, y + 5, 4, 3);

            ctx.restore();
        }

        function drawEnemyBody(ctx, x, y, size, color, isBoss) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = color;

            if (isBoss) {
                // Large Cyber Boss Tank design
                ctx.fillRect(x, y + 15, size, size - 15);
                ctx.fillStyle = '#222';
                ctx.fillRect(x + 10, y + 25, size - 20, size - 40);
                // Glowing eyes
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(x + 15, y + 5, 10, 5);
                ctx.fillRect(x + size - 25, y + 5, 10, 5);
            } else {
                // Alien/Robot Humanoid Shape
                // Head (Spiked)
                ctx.beginPath();
                ctx.moveTo(x + size/2, y);
                ctx.lineTo(x + size, y + size/3);
                ctx.lineTo(x, y + size/3);
                ctx.closePath();
                ctx.fill();
                
                // Torso
                ctx.fillRect(x + 3, y + size/3, size - 6, size/2);
                // Glowing Eye center
                ctx.fillStyle = '#fff';
                ctx.fillRect(x + size/2 - 2, y + size/4, 4, 4);
                // Tiny spike legs
                ctx.fillStyle = color;
                ctx.fillRect(x + 4, y + (size * 0.8), 4, size * 0.2);
                ctx.fillRect(x + size - 8, y + (size * 0.8), 4, size * 0.2);
            }
            ctx.restore();
        }

        function update() {
            if (!gameActive) return;

            // If Frame Freeze Active, don't update positions (Recovery State)
            if (freezeFrames > 0) {
                freezeFrames--;
                return;
            }

            // Decrement invincibility
            if (player.invincibleTimer > 0) player.invincibleTimer--;

            // Camera Shake decay
            if (shakeTime > 0) shakeTime--;

            // Advanced Overdrive Mode activation
            if (kills >= 15 && !player.isAdvanced) {
                player.isAdvanced = true;
                player.advancedTimer = 600; // 10 seconds of glory
                player.color = '#ffd700'; // Gold Advanced Color
                modeBox.innerText = "⭐ ADVANCED MODE ⭐";
                modeBox.style.color = '#ffd700';
                spawnDamageText(player.x, player.y - 30, "ADVANCED OVERDRIVE! 🔥", '#ffd700');
                applyShake(15, 20);
            }

            if (player.isAdvanced) {
                player.advancedTimer--;
                if(player.advancedTimer <= 0) {
                    player.isAdvanced = false;
                    player.color = '#00ffcc';
                    modeBox.innerText = "Normal Mode";
                    modeBox.style.color = '#00ffcc';
                    updateGraphicsTheme();
                }
            }

            // Weapon timers
            if (player.activeWeapon !== 'PISTOL') {
                player.weaponTimer--;
                if (player.weaponTimer <= 0) {
                    player.activeWeapon = 'PISTOL';
                }
            }

            // Rapid Fire Firing
            if (player.activeWeapon === 'RAPID' && isMouseDown) {
                rapidFireCooldown--;
                if (rapidFireCooldown <= 0) {
                    const angle = Math.atan2(mouseY - (player.y + player.height/2), mouseX - (player.x + player.width/2));
                    let speed = player.isAdvanced ? 18 : 14;
                    let fireRate = player.isAdvanced ? 3 : 6;
                    createBullet(player.x + player.width / 2, player.y + player.height / 2, angle, speed, 5, '#eab308', 0.8);
                    rapidFireCooldown = fireRate;
                    applyShake(1.5, 2);
                }
            }

            // Dash logic & Trail Spawning
            if (player.dashCooldown > 0) player.dashCooldown--;
            
            if (player.isDashing) {
                player.vx = player.dashSpeed * player.dashDirection;
                player.vy = 0; 
                player.dashTime--;
                
                player.dashTrails.push({
                    x: player.x,
                    y: player.y,
                    width: player.width,
                    height: player.height,
                    life: 10,
                    color: player.color
                });

                if (player.dashTime <= 0) {
                    player.isDashing = false;
                }
            } else {
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    player.vx = -player.speed;
                    player.facing = -1;
                } else if (keys['KeyD'] || keys['ArrowRight']) {
                    player.vx = player.speed;
                    player.facing = 1;
                } else {
                    player.vx = 0;
                }

                if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && !player.isJumping) {
                    player.vy = -12.5;
                    player.isJumping = true;
                }

                player.vy += gravity;
            }

            // Apply calculated movement
            player.x += player.vx;
            player.y += player.vy;

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            if (player.y + player.height >= floorY) {
                player.y = floorY - player.height;
                player.vy = 0;
                player.isJumping = false;
            }

            // Update Dash Trails
            player.dashTrails.forEach((trail, idx) => {
                trail.life--;
                if (trail.life <= 0) player.dashTrails.splice(idx, 1);
            });

            // Update Player Bullets
            bullets.forEach((bullet, bIdx) => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(bIdx, 1);
                }
            });

            // Update Enemy Bullets
            enemyBullets.forEach((eb, ebIdx) => {
                eb.x += eb.vx;
                eb.y += eb.vy;

                // Hit detection with player
                if (eb.x > player.x && eb.x < player.x + player.width &&
                    eb.y > player.y && eb.y < player.y + player.height) {
                    
                    enemyBullets.splice(ebIdx, 1);
                    if (!player.isDashing && player.invincibleTimer === 0) { 
                        player.hp -= 10;
                        createExplosion(player.x + player.width/2, player.y + player.height/2, '#ff3333', 10);
                        applyShake(8, 15);
                        spawnDamageText(player.x, player.y - 10, "-10 HP", "#ff3333");
                        triggerHitFreeze(); // Freeze frame on hit
                        checkPlayerDeath();
                    }
                }

                if (eb.x < 0 || eb.x > canvas.width || eb.y < 0 || eb.y > canvas.height) {
                    enemyBullets.splice(ebIdx, 1);
                }
            });

            // Update Enemies
            enemies.forEach((enemy, eIdx) => {
                // Aerial Drop Handling
                if (enemy.aerial && enemy.descending) {
                    enemy.y += 2.5; // fall gently from above
                    if (enemy.y >= enemy.targetY) {
                        enemy.y = enemy.targetY;
                        enemy.descending = false;
                    }
                } else {
                    // Regular ground AI tracking player
                    if (enemy.x > player.x) {
                        enemy.x -= enemy.speed;
                    } else {
                        enemy.x += enemy.speed;
                    }
                }

                // AI Shooting
                if (enemy.shootRate > 0) {
                    enemy.shootCooldown--;
                    if (enemy.shootCooldown <= 0 && Math.random() < enemy.shootRate) {
                        const angle = Math.atan2((player.y + player.height/2) - (enemy.y + enemy.size/2), (player.x + player.width/2) - (enemy.x + enemy.size/2));
                        enemyBullets.push({
                            x: enemy.x + enemy.size / 2,
                            y: enemy.y + enemy.size / 2,
                            vx: Math.cos(angle) * 5,
                            vy: Math.sin(angle) * 5,
                            size: 6,
                            color: '#ff3300'
                        });
                        enemy.shootCooldown = 90; 
                    }
                }

                // Enemy Body Collision with Player
                if (enemy.x < player.x + player.width &&
                    enemy.x + enemy.size > player.x &&
                    enemy.y < player.y + player.height &&
                    enemy.y + enemy.size > player.y) {
                    
                    if (!player.isDashing && player.invincibleTimer === 0) {
                        player.hp -= enemy.isBoss ? 3 : 1; 
                        createExplosion(player.x + player.width/2, player.y + player.height/2, '#ff3333', 5);
                        applyShake(6, 10);
                        spawnDamageText(player.x, player.y - 10, enemy.isBoss ? "-3 HP" : "-1 HP", "#ff5555");
                        triggerHitFreeze(); // Freeze frame on body crash
                        checkPlayerDeath();
                    }
                }

                // Player shooting enemy detection
                bullets.forEach((b, bIdx) => {
                    if (b.x > enemy.x && b.x < enemy.x + enemy.size &&
                        b.y > enemy.y && b.y < enemy.y + enemy.size) {
                        
                        if (b.pierces && b.hitEnemies.includes(enemy)) return;

                        if (!b.pierces) {
                            bullets.splice(bIdx, 1);
                        } else {
                            b.hitEnemies.push(enemy);
                        }

                        enemy.hp -= b.damage;
                        let roundedDmg = Math.round(b.damage * 10) / 10;
                        spawnDamageText(enemy.x + enemy.size/2, enemy.y - 10, `-${roundedDmg}`, b.color);
                        createExplosion(b.x, b.y, enemy.color, 4);
                        applyShake(3, 4);

                        if (enemy.hp <= 0) {
                            createExplosion(enemy.x + enemy.size/2, enemy.y + enemy.size/2, enemy.color, 25);
                            enemies.splice(eIdx, 1);
                            kills += enemy.points;
                            applyShake(7, 10);

                            if (Math.random() < 0.35) {
                                spawnPowerup(enemy.x + enemy.size/2, enemy.y + enemy.size/2);
                            }

                            if (enemies.length === 0) {
                                levelClearSequence(); // Triggers Pop-up
                            }
                        }
                    }
                });
            });

            // Update Powerups
            powerups.forEach((pu, idx) => {
                pu.y += Math.sin(Date.now() * 0.01) * 0.4;
                
                if (pu.x > player.x && pu.x < player.x + player.width &&
                    pu.y > player.y && pu.y < player.y + player.height) {
                    
                    activatePowerup(pu.type);
                    powerups.splice(idx, 1);
                }
            });

            // Damage and Particles Update
            damageTexts.forEach((dt, idx) => {
                dt.x += dt.vx;
                dt.y += dt.vy;
                dt.life--;
                if (dt.life <= 0) damageTexts.splice(idx, 1);
            });

            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(idx, 1);
            });

            document.getElementById('level-val').innerText = level;
            document.getElementById('kills-val').innerText = kills;
            document.getElementById('hp-val').innerText = Math.round(player.hp);
            document.getElementById('lives-val').innerText = lives >= 0 ? lives : 0;
        }

        function checkPlayerDeath() {
            if (player.hp <= 0) {
                lives--;
                player.hp = 100; 
                player.x = 100; 
                player.activeWeapon = 'PISTOL';
                player.isAdvanced = false;
                modeBox.innerText = "Normal Mode";
                modeBox.style.color = '#00ffcc';
                spawnDamageText(player.x, player.y - 20, "RESPAWNED 💀", "#ff3300");

                if (lives <= 0) {
                    gameActive = false;
                    govTitle.innerText = "GAME OVER 💀";
                    govScreen.style.display = 'flex';
                }
            }
        }

        function spawnPowerup(x, y) {
            const types = ['TRIPLE', 'RAPID', 'PLASMA'];
            const chosenType = types[Math.floor(Math.random() * types.length)];
            let color = '#22c55e';
            if (chosenType === 'RAPID') color = '#eab308';
            if (chosenType === 'PLASMA') color = '#ef4444';

            powerups.push({
                x: x,
                y: floorY - 18,
                type: chosenType,
                color: color,
                size: 15
            });
        }

        function activatePowerup(type) {
            player.activeWeapon = type;
            player.weaponTimer = 500; 

            if (type === 'TRIPLE') {
                spawnDamageText(player.x, player.y - 25, "TRIPLE SHOT! 🟢", '#22c55e');
            } else if (type === 'RAPID') {
                spawnDamageText(player.x, player.y - 25, "RAPID FIRE! 🟡", '#eab308');
                rapidFireCooldown = 0;
            } else if (type === 'PLASMA') {
                spawnDamageText(player.x, player.y - 25, "PLASMA BLAST! 🔴", '#ef4444');
            }
            applyShake(10, 15);
        }

        // Draw Render Loop
        function draw() {
            let themeIndex = Math.floor((level - 1) / 10);
            if (themeIndex > 9) themeIndex = 9;

            ctx.save();
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * shakeIntensity;
                let dy = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(dx, dy);
            }

            ctx.fillStyle = THEMES[themeIndex].canvasBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Floor
            ctx.fillStyle = '#171719';
            ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);
            
            ctx.strokeStyle = THEMES[themeIndex].neon;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, floorY);
            ctx.lineTo(canvas.width, floorY);
            ctx.stroke();

            // Ghost Trails (Dash)
            player.dashTrails.forEach(trail => {
                ctx.save();
                ctx.globalAlpha = trail.life / 10 * 0.3;
                drawHumanBody(ctx, trail.x, trail.y, trail.width, trail.height, trail.color, player.facing > 0, false);
                ctx.restore();
            });

            // Draw Player Human Body shape
            const flashing = (player.invincibleTimer > 0);
            drawHumanBody(ctx, player.x, player.y, player.width, player.height, player.color, player.facing > 0, flashing);

            // Draw Powerups
            powerups.forEach(pu => {
                ctx.fillStyle = pu.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = pu.color;
                ctx.fillRect(pu.x - pu.size/2, pu.y - pu.size/2, pu.size, pu.size);
                ctx.shadowBlur = 0;
            });

            // Draw Enemy Bods
            enemies.forEach(enemy => {
                drawEnemyBody(ctx, enemy.x, enemy.y, enemy.size, enemy.color, enemy.isBoss);

                if (enemy.hp < enemy.maxHp) {
                    ctx.fillStyle = '#ff0033';
                    ctx.fillRect(enemy.x, enemy.y - 10, enemy.size, 4);
                    ctx.fillStyle = '#00ff66';
                    ctx.fillRect(enemy.x, enemy.y - 10, enemy.size * (enemy.hp / enemy.maxHp), 4);
                }
            });

            // Draw Bullets
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw Enemy Bullets
            enemyBullets.forEach(eb => {
                ctx.fillStyle = eb.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = eb.color;
                ctx.beginPath();
                ctx.arc(eb.x, eb.y, eb.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw Damage Numbers
            damageTexts.forEach(dt => {
                ctx.font = 'bold 13px "Segoe UI"';
                ctx.fillStyle = dt.color;
                ctx.globalAlpha = dt.life / 35;
                ctx.fillText(dt.text, dt.x, dt.y);
            });
            ctx.globalAlpha = 1.0;

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1.0; 

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        updateGraphicsTheme();
        spawnEnemies();
        loop();
    </script>
</body>
